<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Government Scheme & Student Welfare</title>
    <link rel="stylesheet" href="home.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <div class="wrapper">
        <div class="home-container">
            
            <div class="nav-header">
                <div class="logo">
                    <i class='bx bxs-graduation'></i>
                    <span>Portal</span>
                </div>
                <button class="logout-btn" onclick="logout()">
                    <i class='bx bx-log-out'></i> Logout
                </button>
            </div>

            <hr class="divider">

            <div class="welcome-content">
                <i class='bx bxs-party' id="welcome-icon"></i>
                <h1>Welcome Back!</h1>
                <p id="user-display">You are logged in successfully.</p>
                
                <div class="dashboard-grid">
                    <div class="stat-card">
                        <h3>Active Schemes</h3>
                        <p>0 Available</p>
                    </div>
                    <div class="stat-card">
                        <h3>Applications</h3>
                        <p>0 Pending</p>
                    </div>
                </div>

                <button class="action-btn">View Available Welfare Schemes</button>
            </div>

        </div>
    </div>

    <script>
        // Simple protection logic
        const user = localStorage.getItem("user");

        if (!user) {
            window.location.href = "index.html";
        } else {
            // Display username if it exists in localStorage
            document.getElementById("user-display").innerText = `Logged in as: ${user}`;
        }

        function logout() {
            localStorage.removeItem("user");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
