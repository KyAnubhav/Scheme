<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Government Scheme Portal</title>
  <link rel="stylesheet" href="/login.css" />
</head>
<body>
  <div class="page auth-wrap">
    <div class="card auth-card">
      <div class="brand" style="margin-bottom:14px;">
        <div class="eyebrow">Government Scheme Portal</div>
        <h1>Login</h1>
        <p class="sub">Access your profile and matched schemes.</p>
      </div>

      <div class="field-grid">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="name@example.com" autocomplete="email" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Password" autocomplete="current-password" />
        </div>
      </div>

      <div class="auth-actions">
        <button onclick="login()">Login</button>
        <a class="btn ghost" href="/register.html">Create account</a>
      </div>

      <div id="message" class="message"></div>
    </div>
  </div>

  <script src="/login.js"></script>
</body>
</html>
