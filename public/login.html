<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Government Scheme Portal</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="auth-shell">
    <div class="card auth-card">
      <div class="brand" style="margin-bottom:14px;">
        <div class="brand-mark"></div>
        <div>
          <h2>Government Scheme Portal</h2>
          <p>Sign in to continue</p>
        </div>
      </div>

      <h1 class="auth-title">Login</h1>
      <p class="auth-subtitle">Use your verified email and password.</p>

      <div class="form-grid one">
        <div>
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@example.com">
        </div>
        <div>
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="••••••••">
        </div>
      </div>

      <div class="btn-row" style="margin-top:14px;">
        <button onclick="login()">Login</button>
      </div>

      <p class="auth-links">New here? <a href="register.html">Create an account</a></p>
      <div id="msg" class="small" style="margin-top:10px;"></div>
    </div>
  </div>
  <script src="login.js"></script>
</body>
</html>
