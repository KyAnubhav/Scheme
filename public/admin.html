<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · Scheme Portal</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h2>Admin Dashboard</h2>
      <p>Publish, update, and remove schemes.</p>
    </div>
    <div class="topbar-actions">
      <a class="btn btn-ghost btn-small" href="/dashboard.html">User dashboard</a>
      <button class="btn btn-danger btn-small" onclick="logout()">Logout</button>
    </div>
  </header>

  <main class="page stack">
    <section class="grid cols-3" id="adminStats"></section>

    <section class="split">
      <article class="card stack">
        <div class="section-title">
          <h3>Publish scheme</h3>
          <span class="badge gray">SQL Server</span>
        </div>

        <div class="profile-grid cols-2">
          <div><label for="scheme_code">Scheme code</label><input id="scheme_code" placeholder="Auto if empty" /></div>
          <div><label for="scheme_name">Scheme name</label><input id="scheme_name" placeholder="Scheme name" /></div>
          <div><label for="short_title">Short title</label><input id="short_title" placeholder="Short title" /></div>
          <div><label for="beneficiary_type">Beneficiary type</label><select id="beneficiary_type"></select></div>
          <div><label for="ministry_id">Ministry</label><select id="ministry_id"></select></div>
          <div><label for="category_id">Category</label><select id="category_id"></select></div>
          <div><label for="application_mode">Application mode</label><select id="application_mode"><option value="online">Online</option><option value="offline">Offline</option><option value="both">Both</option></select></div>
          <div><label for="benefit_type">Benefit type</label><select id="benefit_type"><option value="financial">Financial</option><option value="subsidy">Subsidy</option><option value="service">Service</option><option value="loan">Loan</option><option value="certificate">Certificate</option></select></div>
          <div><label for="benefit_amount">Benefit amount</label><input id="benefit_amount" type="number" min="0" step="0.01" placeholder="Optional" /></div>
          <div><label for="income_limit">Income limit</label><input id="income_limit" type="number" min="0" step="0.01" placeholder="Optional" /></div>
          <div><label for="state_scope">State scope</label><input id="state_scope" placeholder="National / State name" /></div>
          <div><label for="deadline">Deadline</label><input id="deadline" type="date" /></div>
          <div><label for="official_website">Official website</label><input id="official_website" placeholder="https://..." /></div>
          <div><label for="application_link">Application link</label><input id="application_link" placeholder="https://..." /></div>
          <div><label for="documents_link">Documents link</label><input id="documents_link" placeholder="https://..." /></div>
        </div>

        <div>
          <label for="description">Description</label>
          <textarea id="description" placeholder="Brief scheme description"></textarea>
        </div>

        <div class="section-title" style="margin-top:6px;">
          <h4>Eligibility rules</h4>
          <button class="btn btn-ghost btn-small" type="button" onclick="addRule()">Add rule</button>
        </div>
        <div class="helper">Keep rules simple. Operator is auto-selected from the field.</div>
        <div id="rules" class="rule-list"></div>

        <div class="section-title" style="margin-top:10px;">
          <h4>Required documents</h4>
          <button class="btn btn-ghost btn-small" type="button" onclick="addDocument()">Add document</button>
        </div>
        <div class="helper">Add only the documents really needed for applying.</div>
        <div id="docs" class="rule-list"></div>

        <div class="auth-actions" style="margin-top:8px;">
          <button class="btn btn-primary" onclick="submitScheme()">Publish scheme</button>
          <button class="btn btn-ghost" onclick="resetForm()">Clear form</button>
        </div>
        <div id="msg" class="notice" style="display:none;"></div>
      </article>

      <section class="card stack">
        <div class="section-title">
          <h3>Published schemes</h3>
          <button class="btn btn-ghost btn-small" onclick="loadMeta()">Refresh</button>
        </div>
        <div id="schemes" class="stack"></div>
      </section>
    </section>
  </main>

  <script src="/admin.js"></script>
</body>
</html>
