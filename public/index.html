<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Government Scheme & Student Welfare - Login</title>
    <link rel="stylesheet" href="index.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <div class="wrapper">
        
        <div class="login-box">
            
            <div class="login-header">
                <h1>Government Scheme &<br>Student Welfare</h1>
                <p>Welcome, please login to continue.</p>
            </div>

            <div class="input-group">
                <i class='bx bxs-envelope'></i> <input type="email" id="email" placeholder="Email Address" required>
            </div>

            <div class="input-group">
                <i class='bx bxs-lock-alt' ></i> <input type="password" id="password" placeholder="Password" required>
            </div>

            <div class="remember-forgot">
                <label><input type="checkbox"> Remember me</label>
                <a href="#">Forgot Password?</a>
            </div>

            <button type="button" class="login-btn" onclick="login()">Login</button>
            <div id="message"></div>
            
            <div class="register-link">
                <p>Don't have an account? <a href="register.html">Register here</a></p>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
