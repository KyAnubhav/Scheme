<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile · Scheme Portal</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h2>Profile</h2>
      <p>Fill the details used for scheme matching.</p>
    </div>
    <div class="topbar-actions">
      <a class="btn btn-ghost btn-small" href="/dashboard.html">Back</a>
      <button class="btn btn-danger btn-small" onclick="logout()">Logout</button>
    </div>
  </header>

  <main class="page">
    <div class="split">
      <section class="card stack">
        <div class="section-title">
          <h3>Account</h3>
          <span class="badge gray" id="saveStatus">Loading</span>
        </div>
        <div id="accountBox" class="empty">Loading profile…</div>
      </section>

      <section class="card stack">
        <div class="section-title">
          <h3>Profile details</h3>
          <button class="btn btn-primary btn-small" onclick="saveProfile()">Save profile</button>
        </div>

        <div class="profile-grid cols-2">
          <div><label for="dob">Date of birth</label><input id="dob" type="date" /></div>
          <div><label for="gender">Gender</label><select id="gender"><option value="">Select</option><option>Male</option><option>Female</option><option>Other</option></select></div>
          <div><label for="marital_status">Marital status</label><select id="marital_status"><option value="">Select</option><option>Single</option><option>Married</option><option>Widowed</option><option>Divorced</option></select></div>
          <div><label for="category">Category</label><select id="category"><option value="">Select</option><option>General</option><option>OBC</option><option>SC</option><option>ST</option><option>EWS</option></select></div>
          <div><label for="state">State</label><input id="state" placeholder="State" /></div>
          <div><label for="district">District</label><input id="district" placeholder="District" /></div>
          <div><label for="pincode">Pincode</label><input id="pincode" placeholder="Pincode" /></div>
          <div><label for="annual_family_income">Annual family income</label><input id="annual_family_income" type="number" min="0" placeholder="Income" /></div>
          <div><label for="occupation">Occupation</label><input id="occupation" placeholder="Occupation" /></div>
          <div><label for="education_level">Education level</label><input id="education_level" placeholder="Education level" /></div>
          <div><label for="institution_name">Institution name</label><input id="institution_name" placeholder="Institution name" /></div>
          <div><label for="course_name">Course name</label><input id="course_name" placeholder="Course name" /></div>
          <div><label for="land_holding_acres">Land holding acres</label><input id="land_holding_acres" type="number" step="0.01" min="0" placeholder="Acres" /></div>
          <div><label for="disability_percent">Disability percent</label><input id="disability_percent" type="number" min="0" max="100" placeholder="0 - 100" /></div>
        </div>

        <div>
          <label>Quick flags</label>
          <div class="toggle-row">
            <label class="toggle"><input id="is_student" type="checkbox" /> Student</label>
            <label class="toggle"><input id="is_farmer" type="checkbox" /> Farmer</label>
            <label class="toggle"><input id="minority_status" type="checkbox" /> Minority status</label>
            <label class="toggle"><input id="women_headed_household" type="checkbox" /> Women-headed household</label>
            <label class="toggle"><input id="single_parent" type="checkbox" /> Single parent</label>
            <label class="toggle"><input id="currently_employed" type="checkbox" /> Currently employed</label>
            <label class="toggle"><input id="aadhaar_verified" type="checkbox" /> Aadhaar verified</label>
            <label class="toggle"><input id="bank_account_linked" type="checkbox" /> Bank account linked</label>
          </div>
        </div>

        <div id="msg" class="notice" style="display:none;"></div>
      </section>
    </div>
  </main>

  <script src="/profile.js"></script>
</body>
</html>
