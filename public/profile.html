<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile | Government Scheme Portal</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="panel">
    <div class="topbar">
      <div class="brand">
        <div class="brand-badge">G</div>
        <div>
          <div>Government Scheme Portal</div>
          <div class="note">Complete profile</div>
        </div>
      </div>
      <div class="nav-actions">
        <button class="btn secondary" onclick="goDashboard()">Back</button>
        <button class="btn success" onclick="saveProfile()">Save profile</button>
      </div>
    </div>

    <div class="content">
      <div class="hero">
        <div class="kicker">Profile</div>
        <h1>Give the portal the details it needs</h1>
        <p>More complete information means better scheme matching and better alerts when new schemes appear.</p>
      </div>

      <div class="section card">
        <div class="form-grid four">
          <div class="field"><label>Date of birth</label><input id="dob" type="date"></div>
          <div class="field">
            <label>Gender</label>
            <select id="gender">
              <option value="">Select</option>
              <option>Male</option><option>Female</option><option>Other</option>
            </select>
          </div>
          <div class="field"><label>Marital status</label><input id="marital_status" type="text" placeholder="Single / Married / Other"></div>
          <div class="field"><label>Category</label><input id="category" type="text" placeholder="General / OBC / SC / ST / Minority"></div>

          <div class="field"><label>State</label><input id="state" type="text" placeholder="Karnataka"></div>
          <div class="field"><label>District</label><input id="district" type="text" placeholder="District"></div>
          <div class="field"><label>Pincode</label><input id="pincode" type="text" placeholder="560001"></div>
          <div class="field"><label>Annual family income</label><input id="annual_family_income" type="number" step="0.01" placeholder="120000"></div>

          <div class="field"><label>Occupation</label><input id="occupation" type="text" placeholder="Student / Farmer / Employee / Homemaker"></div>
          <div class="field"><label>Education level</label><input id="education_level" type="text" placeholder="SSLC / PUC / UG / PG"></div>
          <div class="field"><label>Institution name</label><input id="institution_name" type="text" placeholder="College / School / NA"></div>
          <div class="field"><label>Course name</label><input id="course_name" type="text" placeholder="BSc / BA / Diploma"></div>

          <div class="field">
            <label>Student</label>
            <select id="is_student">
              <option value="0">No</option>
              <option value="1">Yes</option>
            </select>
          </div>
          <div class="field">
            <label>Farmer</label>
            <select id="is_farmer">
              <option value="0">No</option>
              <option value="1">Yes</option>
            </select>
          </div>
          <div class="field"><label>Land holding (acres)</label><input id="land_holding_acres" type="number" step="0.01" placeholder="2.5"></div>
          <div class="field"><label>Disability %</label><input id="disability_percent" type="number" placeholder="0"></div>

          <div class="field">
            <label>Minority status</label>
            <select id="minority_status">
              <option value="0">No</option><option value="1">Yes</option>
            </select>
          </div>
          <div class="field">
            <label>Women headed household</label>
            <select id="women_headed_household">
              <option value="0">No</option><option value="1">Yes</option>
            </select>
          </div>
          <div class="field">
            <label>Single parent</label>
            <select id="single_parent">
              <option value="0">No</option><option value="1">Yes</option>
            </select>
          </div>
          <div class="field">
            <label>Currently employed</label>
            <select id="currently_employed">
              <option value="0">No</option><option value="1">Yes</option>
            </select>
          </div>

          <div class="field">
            <label>Aadhaar verified</label>
            <select id="aadhaar_verified">
              <option value="0">No</option><option value="1">Yes</option>
            </select>
          </div>
          <div class="field">
            <label>Bank account linked</label>
            <select id="bank_account_linked">
              <option value="0">No</option><option value="1">Yes</option>
            </select>
          </div>
        </div>

        <p id="msg" class="note" style="margin-top:14px;"></p>
      </div>
    </div>
  </div>

  <script src="/profile.js"></script>
</body>
</html>
