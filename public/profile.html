<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile | Government Scheme Portal</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="content-pane">
    <div class="topbar">
      <div class="brand">
        <div class="brand-badge">G</div>
        <div>
          <div>Government Scheme Portal</div>
          <div class="note">Profile</div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn secondary small" onclick="backToDashboard()">Dashboard</button>
        <button class="btn danger small" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="section">
      <div class="section-head">
        <div>
          <h3>Your details</h3>
          <p class="note">Fill the fields used for matching.</p>
        </div>
        <button class="btn" onclick="saveProfile()">Save profile</button>
      </div>

      <div class="grid three">
        <div class="field"><label for="dob">Date of birth</label><input id="dob" type="date"></div>
        <div class="field"><label for="gender">Gender</label><select id="gender"><option value="">Select</option><option>Male</option><option>Female</option><option>Other</option></select></div>
        <div class="field"><label for="marital_status">Marital status</label><select id="marital_status"><option value="">Select</option><option>Single</option><option>Married</option><option>Widowed</option><option>Divorced</option></select></div>

        <div class="field"><label for="category">Category</label><select id="category"><option value="">Select</option><option>General</option><option>OBC</option><option>SC</option><option>ST</option><option>EWS</option></select></div>
        <div class="field"><label for="state">State</label><input id="state" type="text" placeholder="State"></div>
        <div class="field"><label for="district">District</label><input id="district" type="text" placeholder="District"></div>

        <div class="field"><label for="pincode">Pincode</label><input id="pincode" type="text" placeholder="Pincode"></div>
        <div class="field"><label for="annual_family_income">Annual family income</label><input id="annual_family_income" type="number" step="0.01" placeholder="0"></div>
        <div class="field"><label for="occupation">Occupation</label><input id="occupation" type="text" placeholder="Occupation"></div>

        <div class="field"><label for="education_level">Education level</label><input id="education_level" type="text" placeholder="Education"></div>
        <div class="field"><label for="institution_name">Institution name</label><input id="institution_name" type="text" placeholder="Institution"></div>
        <div class="field"><label for="course_name">Course name</label><input id="course_name" type="text" placeholder="Course"></div>

        <div class="field"><label for="is_student">Student</label><select id="is_student"><option value="0">No</option><option value="1">Yes</option></select></div>
        <div class="field"><label for="is_farmer">Farmer</label><select id="is_farmer"><option value="0">No</option><option value="1">Yes</option></select></div>
        <div class="field"><label for="land_holding_acres">Land holding (acres)</label><input id="land_holding_acres" type="number" step="0.01" placeholder="0"></div>

        <div class="field"><label for="disability_percent">Disability %</label><input id="disability_percent" type="number" placeholder="0"></div>
        <div class="field"><label for="minority_status">Minority status</label><select id="minority_status"><option value="0">No</option><option value="1">Yes</option></select></div>
        <div class="field"><label for="women_headed_household">Women-headed household</label><select id="women_headed_household"><option value="0">No</option><option value="1">Yes</option></select></div>

        <div class="field"><label for="single_parent">Single parent</label><select id="single_parent"><option value="0">No</option><option value="1">Yes</option></select></div>
        <div class="field"><label for="currently_employed">Currently employed</label><select id="currently_employed"><option value="0">No</option><option value="1">Yes</option></select></div>
        <div class="field"><label for="aadhaar_verified">Aadhaar verified</label><select id="aadhaar_verified"><option value="0">No</option><option value="1">Yes</option></select></div>

        <div class="field"><label for="bank_account_linked">Bank account linked</label><select id="bank_account_linked"><option value="0">No</option><option value="1">Yes</option></select></div>
      </div>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <script src="/profile.js"></script>
</body>
</html>
