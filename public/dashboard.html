<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard · Scheme Portal</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h2>Scheme Portal</h2>
      <p>Your matched schemes and all active schemes.</p>
    </div>
    <div class="topbar-actions">
      <a class="btn btn-ghost btn-small" href="/profile.html">Profile</a>
      <button class="btn btn-danger btn-small" onclick="logout()">Logout</button>
    </div>
  </header>

  <main class="page stack">
    <section class="grid cols-3" id="stats"></section>

    <section class="split">
      <aside class="stack">
        <div class="card">
          <div class="section-title">
            <h3>Profile</h3>
            <span class="badge" id="profileStatus">Loading</span>
          </div>
          <div id="profileBox" class="stack"></div>
          <div style="margin-top:14px;">
            <a class="btn btn-primary btn-block" href="/profile.html">Update profile</a>
          </div>
        </div>
        <div class="card soft">
          <h4>Tip</h4>
          <p>Fill your profile once to see scheme matches based on your details.</p>
        </div>
      </aside>

      <section class="stack">
        <div class="card">
          <div class="section-title">
            <h3>Matched schemes</h3>
            <span class="badge green" id="matchedCount">0</span>
          </div>
          <div id="matchedSchemes" class="stack"></div>
        </div>

        <div class="card">
          <div class="section-title">
            <h3>All active schemes</h3>
            <span class="badge gray" id="allCount">0</span>
          </div>
          <div id="allSchemes" class="stack"></div>
        </div>
      </section>
    </section>
  </main>

  <script src="/dashboard.js"></script>
</body>
</html>
