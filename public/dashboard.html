<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | Government Scheme Portal</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="content-pane">
    <div class="topbar">
      <div class="brand">
        <div class="brand-badge">G</div>
        <div>
          <div>Government Scheme Portal</div>
          <div class="note">User dashboard</div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn secondary small" onclick="goProfile()">Profile</button>
        <button class="btn secondary small" onclick="refreshDashboard()">Refresh</button>
        <button class="btn danger small" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="hero-panel card">
      <div class="nav-title">
        <p class="muted small">Your matches</p>
        <h1 style="margin:0;">Eligible schemes</h1>
        <p class="note">Complete your profile to improve matching.</p>
      </div>

      <div class="stats" id="stats"></div>
    </div>

    <div class="section">
      <div class="section-head">
        <div>
          <h3>Filters</h3>
          <p class="note">Search and narrow the list.</p>
        </div>
      </div>
      <div class="filters">
        <div class="field">
          <label for="search">Search</label>
          <input id="search" type="text" placeholder="Scheme name or ministry" oninput="renderSchemes()" />
        </div>
        <div class="field">
          <label for="categoryFilter">Category</label>
          <select id="categoryFilter" onchange="renderSchemes()">
            <option value="">All</option>
          </select>
        </div>
        <div class="field">
          <label for="stateFilter">State</label>
          <select id="stateFilter" onchange="renderSchemes()">
            <option value="">All</option>
            <option value="National">National</option>
            <option value="Andhra Pradesh">Andhra Pradesh</option>
            <option value="Karnataka">Karnataka</option>
            <option value="Kerala">Kerala</option>
            <option value="Tamil Nadu">Tamil Nadu</option>
            <option value="Maharashtra">Maharashtra</option>
            <option value="Gujarat">Gujarat</option>
            <option value="Telangana">Telangana</option>
          </select>
        </div>
        <div class="field">
          <label>&nbsp;</label>
          <button class="btn" onclick="clearFilters()">Clear</button>
        </div>
      </div>
    </div>

    <div class="grid two">
      <div class="section">
        <div class="section-head">
          <div>
            <h3>Matched schemes</h3>
            <p class="note">Based on your profile.</p>
          </div>
        </div>
        <div id="matchedSchemes" class="list-grid"></div>
      </div>

      <div class="section">
        <div class="section-head">
          <div>
            <h3>Profile snapshot</h3>
            <p class="note">Used by the matcher.</p>
          </div>
        </div>
        <div id="profileBox" class="list-grid"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-head">
        <div>
          <h3>All active schemes</h3>
          <p class="note">Browse everything in one place.</p>
        </div>
      </div>
      <div id="allSchemes" class="list-grid"></div>
    </div>
  </div>

  <script src="/dashboard.js"></script>
</body>
</html>
