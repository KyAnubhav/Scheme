<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | Government Scheme Portal</title>
  <link rel="stylesheet" href="/register.css" />
</head>
<body>
  <div class="page auth-wrap">
    <div class="card auth-card">
      <div class="brand" style="margin-bottom:14px;">
        <div class="eyebrow">Government Scheme Portal</div>
        <h1>Create account</h1>
        <p class="sub">Verify by email, then complete your profile after login.</p>
      </div>

      <div class="field-grid">
        <div class="field">
          <label for="username">Name</label>
          <input id="username" type="text" placeholder="Full name" autocomplete="name" />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="name@example.com" autocomplete="email" />
        </div>
        <div class="field">
          <label for="phone">Phone</label>
          <input id="phone" type="tel" placeholder="Phone number" autocomplete="tel" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Create password" autocomplete="new-password" />
        </div>
      </div>

      <div class="auth-actions">
        <button onclick="sendOtp()">Send OTP</button>
        <button class="secondary" onclick="verifyOtp()">Verify & create account</button>
        <a class="btn ghost" href="/login.html">Login</a>
      </div>

      <div class="field-grid" style="margin-top:10px;">
        <div class="field">
          <label for="otp">OTP</label>
          <input id="otp" type="text" inputmode="numeric" placeholder="Enter OTP" />
        </div>
      </div>

      <div id="message" class="message"></div>
    </div>
  </div>

  <script src="/register.js"></script>
</body>
</html>
