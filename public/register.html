<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Government Scheme Portal</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="auth-shell">
    <div class="card auth-card">
      <div class="brand" style="margin-bottom:14px;">
        <div class="brand-mark"></div>
        <div>
          <h2>Government Scheme Portal</h2>
          <p>Create account and verify by OTP</p>
        </div>
      </div>

      <h1 class="auth-title">Register</h1>
      <p class="auth-subtitle">Create your account, verify the OTP, then complete your profile.</p>

      <div class="form-grid one">
        <div>
          <label for="username">Name</label>
          <input id="username" type="text" placeholder="Full name">
        </div>
        <div>
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@example.com">
        </div>
        <div>
          <label for="phone">Phone</label>
          <input id="phone" type="text" placeholder="10-digit mobile number">
        </div>
        <div>
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Create a password">
        </div>
      </div>

      <div class="btn-row" style="margin-top:14px;">
        <button onclick="register()">Send OTP</button>
      </div>

      <div class="split" style="margin-top:14px;">
        <div>
          <label for="otp">OTP</label>
          <input id="otp" type="text" placeholder="Enter OTP">
        </div>
        <div style="display:flex; align-items:end;">
          <button onclick="verifyOtp()" style="width:100%;">Verify & Create Account</button>
        </div>
      </div>

      <p class="auth-links">Already registered? <a href="login.html">Login here</a></p>
      <div id="msg" class="small" style="margin-top:10px;"></div>
    </div>
  </div>
  <script src="register.js"></script>
</body>
</html>
