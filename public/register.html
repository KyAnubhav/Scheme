<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | Government Scheme Portal</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="shell">
    <div class="auth-wrap">
      <div class="auth-left">
        <div>
          <div class="brand">
            <div class="brand-badge">G</div>
            <div>Government Scheme Portal</div>
          </div>
          <h1 class="auth-title">Register once. Verify by email. Start getting matched.</h1>
          <p style="margin-top:12px;max-width:520px">
            After verification, complete your profile and let the portal find schemes that fit your details.
          </p>
        </div>
        <div class="footer">OTP verification enabled</div>
      </div>

      <div class="auth-right">
        <div class="auth-card">
          <div>
            <div class="kicker">Create account</div>
            <h2>Register</h2>
            <p>Fill details and request OTP.</p>
          </div>

          <div class="field"><label>Name</label><input id="username" type="text" placeholder="Full name" /></div>
          <div class="field"><label>Email</label><input id="email" type="email" placeholder="you@example.com" /></div>
          <div class="field"><label>Phone</label><input id="phone" type="text" placeholder="10-digit phone number" /></div>
          <div class="field"><label>Password</label><input id="password" type="password" placeholder="Create password" /></div>

          <button class="btn" onclick="sendOtp()">Send OTP</button>

          <div id="otpArea" class="hide">
            <div class="field"><label>OTP</label><input id="otp" type="text" placeholder="Enter 6-digit OTP" /></div>
            <button class="btn success" onclick="verifyOtp()">Verify & Create Account</button>
          </div>

          <p class="note">Already registered? <a href="/login.html">Login here</a></p>
          <p id="msg" class="note"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="/register.js"></script>
</body>
</html>
