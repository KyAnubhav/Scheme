<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register · Scheme Portal</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <div class="brand">
        <h1>Create account</h1>
        <p>Use email OTP to verify your account.</p>
      </div>

      <div class="form-grid">
        <div>
          <label for="username">Name</label>
          <input id="username" placeholder="Full name" autocomplete="name" />
        </div>
        <div>
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div>
          <label for="phone">Phone</label>
          <input id="phone" placeholder="10-digit mobile number" autocomplete="tel" />
        </div>
        <div>
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Create password" autocomplete="new-password" />
        </div>
      </div>

      <div class="auth-actions">
        <button class="btn btn-primary" onclick="register()">Send OTP</button>
        <a class="btn btn-ghost" href="/login.html">Back to login</a>
      </div>

      <div class="auth-sep"></div>

      <div class="form-grid">
        <div>
          <label for="otp">OTP</label>
          <input id="otp" placeholder="Enter OTP" inputmode="numeric" />
        </div>
      </div>

      <div class="auth-actions">
        <button class="btn btn-success" onclick="verifyOtp()">Verify &amp; Create</button>
      </div>
      <div id="msg" class="notice" style="display:none;margin-top:14px;"></div>
    </section>
  </main>
  <script src="/register.js"></script>
</body>
</html>
