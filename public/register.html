<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | Government Scheme Portal</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="page">
    <div class="shell">
      <aside class="auth-left">
        <div>
          <div class="brand">
            <div class="brand-badge">G</div>
            <div>Government Scheme Portal</div>
          </div>
          <h1 class="hero-title">Register once. Verify by email.</h1>
          <p class="hero-copy">Complete your profile after login and the portal will match schemes automatically.</p>
        </div>
        <div class="hero-footer">OTP verification enabled</div>
      </aside>

      <main class="auth-right">
        <div class="auth-card">
          <div class="nav-title" style="margin-bottom: 18px;">
            <p class="muted small">Create account</p>
            <h2>Register</h2>
          </div>

          <div class="grid">
            <div class="field">
              <label for="username">Name</label>
              <input id="username" type="text" placeholder="Your name" autocomplete="name" />
            </div>
            <div class="field">
              <label for="email">Email</label>
              <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />
            </div>
            <div class="field">
              <label for="phone">Phone</label>
              <input id="phone" type="tel" placeholder="10-digit phone" autocomplete="tel" />
            </div>
            <div class="field">
              <label for="password">Password</label>
              <input id="password" type="password" placeholder="Choose a password" autocomplete="new-password" />
            </div>
            <div class="btn-row">
              <button class="btn" id="otpBtn" onclick="sendOtp()">Send OTP</button>
            </div>

            <div id="otpArea" class="grid hide">
              <div class="field">
                <label for="otp">OTP</label>
                <input id="otp" type="text" placeholder="Enter OTP" inputmode="numeric" />
              </div>
              <button class="btn success" id="verifyBtn" onclick="verifyOtp()">Verify &amp; Create Account</button>
            </div>

            <div class="msg" id="msg"></div>

            <div class="link-row small">
              <span class="muted">Already registered?</span>
              <a href="/login.html">Login here</a>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="/register.js"></script>
</body>
</html>
